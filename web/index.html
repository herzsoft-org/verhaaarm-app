    window.pdfRenderOptions = {
      cMapUrl: './pdfjs/cmaps/',

    };
</script>

<script src="flutter_bootstrap.js" async></script>

<!-- Android Chrome Web keyboard workaround: fixes "stuck viewport / white gap" after keyboard closes REMOVE WHEN FLUTTER UPDATED -->
<script>
    (function () {
      const isAndroid = /Android/i.test(navigator.userAgent);
      if (!isAndroid || !window.visualViewport) return;

      let lastHeight = window.visualViewport.height;

      window.visualViewport.addEventListener('resize', function () {
        const h = window.visualViewport.height;

        // If height increases significantly, keyboard likely closed.
        if (h > lastHeight + 100) {
          window.scrollTo(0, 0);

          const el = document.activeElement;
          if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
            el.blur();
          }
        }

        lastHeight = h;
      });
    })();
</script>
