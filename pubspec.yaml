name: verhaaarm
description: "Verhåårm App"
publish_to: 'none'

version: 1.4.7+51

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  jwt_decode: ^0.3.1

  web: any

  cupertino_icons: ^1.0.8

  flutter_local_notifications: ^19.5.0

  dio: ^5.7.0
  flutter_secure_storage: ^10.0.0
  go_router: ^17.0.1
  intl: ^0.20.2

  camera: ^0.11.0+2
  image_picker: ^1.2.1

  path_provider: ^2.1.4
  share_plus: ^12.0.1

  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  http_parser: ^4.1.2
  file_picker: ^10.3.8
  crypto: ^3.0.7

  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0

  flutter_svg: ^2.2.4
  pdfx: ^2.9.2
  file_saver: ^0.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/zirkel.svg
    - assets/icons/moustache.svg
    - assets/data/schnupfsprueche.json
    - assets/legal/

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true

  # Fallback for “default icons Android” + web (required)
  image_path: assets/icon.png

  # Adaptive icon (Android 8+)
  adaptive_icon_foreground: assets/icon_fg.png
  adaptive_icon_background: "#000000"

    # optional (only if you want):
    # background_color: "#FFFFFF"
    # theme_color: "#FFFFFF"
