name: Build & Deploy Flutter APK (Android)

on:
  workflow_dispatch:

concurrency:
  group: verhaaarm-apk-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor (info)
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter doctor -v || true

      - name: Flutter pub get
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get

      # --- ANDROID SIGNING SETUP ---
      # Secrets needed:
      #   ANDROID_KEYSTORE_B64          (base64 of your .jks)
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_PASSWORD
      #   ANDROID_KEY_ALIAS
      - name: Prepare Android keystore + key.properties (trim)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p android/app

          # decode keystore (strip whitespace just in case)
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | tr -d '\r\n ' | base64 -d > android/app/release.jks
          chmod 600 android/app/release.jks
          ls -la android/app/release.jks

          # trim secrets (CR/LF are the usual culprits)
          STORE_PW="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | tr -d '\r\n')"
          KEY_PW="$(printf '%s' "${{ secrets.ANDROID_KEY_PASSWORD }}" | tr -d '\r\n')"
          ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n')"

          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=$STORE_PW
          keyPassword=$KEY_PW
          keyAlias=$ALIAS
          EOF

          echo "== key.properties created =="
          sed -e 's/storePassword=.*/storePassword=*** /' \
              -e 's/keyPassword=.*/keyPassword=*** /' \
              -e 's/keyAlias=.*/keyAlias=*** /' android/key.properties

      - name: Keystore sanity check (verbose)
        shell: bash
        run: |
          set -euo pipefail
          
          echo "== file exists? =="
          ls -la android/app/release.jks
          
          echo "== keytool list (no passwords printed) =="
          set +e
          keytool -list -keystore android/app/release.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          RC=$?
          set -e
          
          if [ "$RC" -ne 0 ]; then
            echo "keytool failed to open the keystore -> wrong ANDROID_KEYSTORE_PASSWORD or wrong ANDROID_KEYSTORE_B64"
            exit 1
          fi
          
          echo "== alias check =="
          keytool -list -keystore android/app/release.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            | grep -F "verhaarm_release" >/dev/null
          
          echo "Keystore + alias OK."


      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      

      - name: Build APK (release)
        shell: bash
        run: |
          set -euo pipefail

          flutter build apk --release

          DIR="build/app/outputs/flutter-apk"
          SRC="$DIR/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "Could not find Flutter release APK: $SRC"
            echo "Directory listing:"
            ls -la "$DIR" || true
            exit 1
          fi

          VERSION="$(grep -E '^version:[[:space:]]*' pubspec.yaml | head -n1 | sed -E 's/^version:[[:space:]]*//')"
          if [ -z "${VERSION:-}" ]; then
            echo "Could not extract version from pubspec.yaml"
            exit 1
          fi

          APK="$DIR/verhaarm-release-$VERSION.apk"
          cp "$SRC" "$APK"
          sha1sum "$APK" | awk '{print $1}' > "$APK.sha1"

          echo "== build/app/outputs/flutter-apk =="
          ls -la "$DIR" | head -200

      # Uses the renamed files created immediately after flutter build apk:
      #   build/app/outputs/flutter-apk/verhaarm-release-<versionName>+<versionCode>.apk
      #   build/app/outputs/flutter-apk/verhaarm-release-<versionName>+<versionCode>.apk.sha1
      - name: Generate latest.json from renamed APK
        shell: bash
        run: |
          set -euo pipefail

          DIR="build/app/outputs/flutter-apk"

          APK="$(ls -1 "$DIR"/verhaarm-release-*.apk | head -n1 || true)"
          if [ -z "${APK:-}" ] || [ ! -f "$APK" ]; then
            echo "Could not find renamed release APK in $DIR (expected verhaarm-release-*.apk)."
            echo "Directory listing:"
            ls -la "$DIR" || true
            exit 1
          fi

          SHA1_FILE="${APK}.sha1"
          if [ ! -f "$SHA1_FILE" ]; then
            echo "Missing sha1 file next to APK: $SHA1_FILE"
            echo "Directory listing:"
            ls -la "$DIR" || true
            exit 1
          fi

          # Extract version from filename: verhaarm-release-<VERSION>.apk
          APK_BASENAME="$(basename "$APK")"
          VERSION="$(echo "$APK_BASENAME" | sed -E 's/^verhaarm-release-//' | sed -E 's/\.apk$//')"

          SHA1="$(cat "$SHA1_FILE" | tr -d '\r\n')"

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "sha1": "$SHA1"
          }
          EOF

          echo "== latest.json =="
          cat latest.json

      # --- SSH DEPLOY ---
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s' "${{ secrets.VPS_SSH_KEY_B64 }}" | tr -d '\r\n' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload renamed APK + sha1 + latest.json to VPS staging dir
        shell: bash
        run: |
          set -euo pipefail

          DIR="build/app/outputs/flutter-apk"
          APK="$(ls -1 "$DIR"/verhaarm-release-*.apk | head -n1)"
          SHA1_FILE="${APK}.sha1"

          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'mkdir -p /home/herz/verhaaarm-apk/'

          echo "== rsync upload to staging =="
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./latest.json "$APK" "$SHA1_FILE" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/herz/verhaaarm-apk/"

          echo "== remote staging listing (first 50) =="
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'ls -la /home/herz/verhaaarm-apk/ | head -50'

      - name: Publish to /var/www/html/verhaarm (sudo exact commands)
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'set -euo pipefail
             sudo -n /bin/mkdir -p /var/www/html/verhaarm
             sudo -n /usr/bin/rsync -a --delete /home/herz/verhaaarm-apk/ /var/www/html/verhaarm/
             sudo -n /bin/chown -R www-data.www-data /var/www/html/verhaarm
             echo "Publish done."
             ls -la /var/www/html/verhaarm | head -50
            '
